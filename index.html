<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Austin's Checklist</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
  }
  .container {
    width: 100%;
    max-width: 600px;
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 24px;
    color: #fff;
  }
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
  }
  .input-row input {
    flex: 1;
    padding: 12px 16px;
    font-size: 16px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus {
    border-color: #555;
  }
  .input-row input::placeholder {
    color: #666;
  }
  .input-row button {
    padding: 12px 20px;
    font-size: 16px;
    font-weight: 500;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .input-row button:hover { opacity: 0.85; }
  .list { list-style: none; }
  .item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: #141414;
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    margin-bottom: 8px;
    transition: opacity 0.3s, background 0.2s;
  }
  .item:hover { background: #1a1a1a; }
  .item.checked { opacity: 0.45; }
  .item.checked .item-text { text-decoration: line-through; }
  .checkbox {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border: 2px solid #444;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .checkbox:hover { border-color: #888; }
  .item.checked .checkbox {
    background: #fff;
    border-color: #fff;
  }
  .checkbox svg {
    display: none;
    width: 14px;
    height: 14px;
  }
  .item.checked .checkbox svg { display: block; }
  .item-text {
    flex: 1;
    font-size: 16px;
    line-height: 1.4;
    word-break: break-word;
  }
  .delete-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    padding: 4px;
    font-size: 18px;
    line-height: 1;
    transition: color 0.2s;
    opacity: 0;
  }
  .item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: #e44; }
  .empty {
    text-align: center;
    color: #444;
    padding: 60px 0;
    font-size: 15px;
  }
  .stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
    font-size: 13px;
    color: #555;
  }
  .clear-done {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 13px;
    transition: color 0.2s;
  }
  .clear-done:hover { color: #e44; }
</style>
</head>
<body>
<div class="container">
  <h1>Checklist</h1>
  <div class="input-row">
    <input type="text" id="newItem" placeholder="Add something..." autofocus>
    <button onclick="addItem()">Add</button>
  </div>
  <div class="stats" id="stats"></div>
  <ul class="list" id="list"></ul>
  <div class="empty" id="empty">Nothing here yet. Add your first item above.</div>
</div>

<script>
const STORAGE_KEY = 'austin-checklist';

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function save(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

function render() {
  const items = load();
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const stats = document.getElementById('stats');

  if (items.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    stats.innerHTML = '';
    return;
  }

  empty.style.display = 'none';
  const done = items.filter(i => i.done).length;
  stats.innerHTML = `<span>${items.length} item${items.length !== 1 ? 's' : ''} &middot; ${done} done</span>` +
    (done > 0 ? `<button class="clear-done" onclick="clearDone()">Clear completed</button>` : '');

  list.innerHTML = items.map((item, i) => `
    <li class="item ${item.done ? 'checked' : ''}" data-i="${i}">
      <div class="checkbox" onclick="toggle(${i})">
        <svg viewBox="0 0 14 14" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="2.5 7 5.5 10.5 11.5 3.5"/>
        </svg>
      </div>
      <span class="item-text">${escHtml(item.text)}</span>
      <button class="delete-btn" onclick="remove(${i})" title="Delete">&times;</button>
    </li>
  `).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function addItem() {
  const input = document.getElementById('newItem');
  const text = input.value.trim();
  if (!text) return;
  const items = load();
  items.unshift({ text, done: false, created: Date.now() });
  save(items);
  input.value = '';
  input.focus();
  render();
}

function toggle(i) {
  const items = load();
  if (items[i]) {
    items[i].done = !items[i].done;
    save(items);
    render();
  }
}

function remove(i) {
  const items = load();
  items.splice(i, 1);
  save(items);
  render();
}

function clearDone() {
  const items = load().filter(i => !i.done);
  save(items);
  render();
}

document.getElementById('newItem').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

render();
</script>
</body>
</html>
